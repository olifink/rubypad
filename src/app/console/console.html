<div #output class="console-output" role="log" aria-label="Console output">
  @if (lines().length === 0) {
    <p class="console-placeholder">Run your code to see output here.</p>
  } @else {
    @for (line of lines(); track $index) {
      <div class="console-line" [class.console-line--error]="line.isError">{{ line.text }}</div>
    }
  }
</div>

@if (lines().length > 0) {
  <button
    mat-icon-button
    class="clear-btn"
    aria-label="Clear output"
    matTooltip="Clear output"
    (click)="clear.emit()"
  >
    <mat-icon>close</mat-icon>
  </button>
}
