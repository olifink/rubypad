<mat-sidenav-container class="sidenav-container">
  <mat-sidenav class="app-sidenav" [opened]="sidenavOpen()" (openedChange)="sidenavOpen.set($event)" mode="over">
    <div class="sidenav-header">
      <span class="sidenav-title">Settings</span>
      <button mat-icon-button (click)="sidenavOpen.set(false)" aria-label="Close settings">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <mat-divider />

    <div class="sidenav-body">
      <div class="sidenav-section">
        <div class="sidenav-section-label">File</div>
        <button mat-button class="sidenav-action" (click)="newFile()">
          <mat-icon>add</mat-icon>
          New file
        </button>
        <button mat-button class="sidenav-action" (click)="openFile()" matTooltip="Ctrl+O">
          <mat-icon>folder_open</mat-icon>
          Open file
        </button>
        <button mat-button class="sidenav-action" (click)="downloadCode()">
          <mat-icon>download</mat-icon>
          Download file
        </button>
        <button mat-button class="sidenav-action" (click)="shareCode(); sidenavOpen.set(false)">
          <mat-icon>share</mat-icon>
          Share
        </button>
      </div>

      <mat-divider />

      <div class="sidenav-section">
        <div class="sidenav-section-label">Settings</div>
        <button mat-button class="sidenav-action" (click)="openAiSettings()">
          <mat-icon>smart_toy</mat-icon>
          AI
        </button>
      </div>

      <div class="sidenav-section sidenav-section--bottom">
        <mat-divider />
        <div class="sidenav-section-label">Appearance</div>
        <mat-button-toggle-group class="sidenav-toggle-group" [value]="theme.mode()"
          (change)="theme.setMode($event.value)" hideSingleSelectionIndicator aria-label="Theme">
          <mat-button-toggle value="light" aria-label="Light mode">
            <mat-icon>light_mode</mat-icon>
            <span class="toggle-label">Light</span>
          </mat-button-toggle>
          <mat-button-toggle value="dark" aria-label="Dark mode">
            <mat-icon>dark_mode</mat-icon>
            <span class="toggle-label">Dark</span>
          </mat-button-toggle>
          <mat-button-toggle value="system" aria-label="System theme">
            <mat-icon>brightness_auto</mat-icon>
            <span class="toggle-label">System</span>
          </mat-button-toggle>
        </mat-button-toggle-group>
      </div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <input #fileInput type="file" accept=".rb,.txt" class="visually-hidden" (change)="onFileSelected($event)">
    <div class="app-content">
      <header>
        <mat-toolbar class="app-toolbar">
          <button mat-icon-button (click)="sidenavOpen.set(true)" aria-label="Open settings">
            <mat-icon>menu</mat-icon>
          </button>
          <span class="app-title">RubyPad</span>
          <span class="toolbar-spacer"></span>

          @if (aiService.hasApiKey()) {
          <button mat-icon-button (click)="openAiPrompt()"
            [matTooltip]="selection() ? 'AI Fix (Ctrl+\\)' : 'AI Insert (Ctrl+\\)'"
            [attr.aria-label]="selection() ? 'AI Fix' : 'AI Insert'">
            <mat-icon>auto_awesome</mat-icon>
          </button>
          }

          <mat-button-toggle-group class="layout-toggle" [value]="layout()" (change)="setLayout($event.value)"
            hideSingleSelectionIndicator aria-label="Layout mode">
            <mat-button-toggle value="editor" matTooltip="Editor only" aria-label="Editor only">
              <mat-icon>code</mat-icon>
            </mat-button-toggle>
            <mat-button-toggle value="both" matTooltip="Editor and panel" aria-label="Editor and panel">
              <mat-icon>view_agenda</mat-icon>
            </mat-button-toggle>
            <mat-button-toggle value="panel" matTooltip="Panel only" aria-label="Panel only">
              <mat-icon>dvr</mat-icon>
            </mat-button-toggle>
          </mat-button-toggle-group>
        </mat-toolbar>
      </header>

      <main class="app-workspace" [style.--split-ratio]="splitRatio()" #workspace>
        <section class="editor-pane" [style.flex]="splitRatio()" aria-label="Code editor">
          <app-editor [initialCode]="initialCode" [isDark]="theme.effectiveIsDark()" (codeChange)="onCodeChange($event)"
            (cursorChange)="onCursorChange($event)" (selectionChange)="onSelectionChange($event)" />
        </section>

        <div class="pane-divider" role="separator" aria-orientation="horizontal" aria-label="Resize panels"
          (pointerdown)="onDividerPointerDown($event)"></div>

        <section class="console-pane" [style.flex]="1 - splitRatio()" aria-label="Output panel">
          <mat-tab-group class="panel-tabs" animationDuration="150ms" [selectedIndex]="activePanelTabIndex()"
            (selectedIndexChange)="onPanelTabChange($event)">
            <mat-tab label="Output">
              <app-console [lines]="outputLines()" (clear)="clearOutput()" />
            </mat-tab>
            <mat-tab label="REPL">
              <app-repl [isDark]="theme.effectiveIsDark()" />
            </mat-tab>
            <mat-tab label="Docs">
              <app-docs [cursorInfo]="cursorInfo()" />
            </mat-tab>
          </mat-tab-group>
        </section>
      </main>

      <button mat-fab class="run-fab" (click)="runCode()"
        [disabled]="!runner.isReady() || aiService.isGenerating() || isRunning()"
        [matTooltip]="aiService.isGenerating() ? 'AI is generating code...' : (isRunning() ? 'Running…' : (runner.isReady() ? 'Run (Ctrl+R)' : 'Loading Ruby…'))"
        aria-label="Run Ruby code">
        <mat-icon aria-hidden="true">{{ aiService.isGenerating() ? 'auto_awesome' : (isRunning() ? 'hourglass_empty' : (runner.isReady() ? 'play_arrow' : 'hourglass_empty')) }}</mat-icon>
      </button>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
